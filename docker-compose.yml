services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: b2b_db
      POSTGRES_USER: b2b_user
      POSTGRES_PASSWORD: b2b_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U b2b_user -d b2b_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  b2b:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://b2b_user:b2b_pass@db:5432/b2b_db
      JWT_SECRET: dev-secret-change-in-prod
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
